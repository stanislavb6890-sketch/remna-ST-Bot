events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/javascript
        text/plain
        image/svg+xml
        font/woff2;

    # Резолвер Docker: имя api резолвится при запросе, а не при старте nginx
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name test.stealthnet.app;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name test.stealthnet.app;

        ssl_certificate     /etc/nginx/ssl/live/panel.stealthnet.app/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/panel.stealthnet.app/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        root /var/www/stealthnet;
        index index.html;

        location /api/ {
            set $api_backend "api:5000";
            proxy_pass http://$api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Service Worker — без кэша, чтобы браузер всегда проверял обновления
        location ~* ^/(sw\.js|workbox-.*)$ {
            expires off;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Статика с хэшем в имени — долгий кэш
        location ~* \.(js|css|ico|png|jpg|jpeg|svg|woff2|woff|ttf|webp|gif)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}